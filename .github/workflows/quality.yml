name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install

      - name: Package build + declaration integrity
        run: bun run build:strict

      - name: Type + Svelte checks (warnings fail)
        run: bun run check

      - name: Tests
        run: bun run test:run
